spring.application.name=asset_registry

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/muast_asset_registry
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate configuration
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Secret
# REQUIREMENTS: Base64-encoded, minimum 256 bits (32 bytes) for HS256 algorithm
jwt.secret=jUjXvJA/E5lIOcAtSXVjgBBOGyKfWRvaQcLJFzlO84Q=

# Access token validity period
# FORMAT: Milliseconds (long integer)
# DEFAULT: 600000 (10 minutes) for production
# CURRENT: 60000 = 1 minute (good for development/ testing)
# SECURITY: Shorter = more secure, but worse UX
jwt.expiration=60000

# Refresh token validity period
# FORMAT: Milliseconds (long integer)
# SHOULD BE: Longer than access token (typically hours/days)
# CURRENT: 120000 = 2 minutes (1:2 ratio with access token)
# PRODUCTION TYPICAL: 604800000 (7 days) or 2592000000 (30 days)
jwt.refresh-expiration=120000